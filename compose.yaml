x-shared-env: &shared-env
  APP_ENV: development
  LOG_LEVEL: debug
  # Postgres
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_NAME: ${DB_NAME:-app}
  DB_PORT: ${DB_PORT:-5432}

services:
  db:
    image: postgres:alpine
    environment:
      <<: *shared-env
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_PORT: ${DB_PORT:-5432}
    # volumes:
    # - ./app/db/postgres/data:/var/lib/postgresql/data
    # - ./apps/api/db/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME} || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s

  gcs-emulator:
    image: google/cloud-sdk:emulators
    container_name: gcs-emulator
    ports:
      - "1324:1324"
    volumes:
      - ./gcs_data:/data # データを永続化する場合
    # 0.0.0.0でバインドし、データを保存するディレクトリを指定
    command: gcloud emulators storage start --address=0.0.0.0 --port=1324 --data-dir=/data
